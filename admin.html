<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gazdálkodj Pajkosan - Admin</title>
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body class="boardgame-body">
  <div class="app-shell">
    <header class="topbar">
      <div>
        <div class="eyebrow">ADMIN FELÜLET</div>
        <h1>Gazdálkodj Pajkosan - Admin</h1>
        <p class="subtitle">Mezők, tárgyak, kártyák, dizájn és globális szabályok szerkesztése.</p>
      </div>
      <div id="adminStatus" class="status-box">Betöltés...</div>
    </header>

    <main class="main-wrap admin-layout">
      <section class="panel parchment-panel">
        <h2>Globális beállítások</h2>
        <div class="form-grid three-col top-gap">
          <label>Játék címe<input id="cfgGameTitle" type="text" /></label>
          <label>Alcím<input id="cfgGameSubtitle" type="text" /></label>
          <label>Pénznem<input id="cfgCurrencyName" type="text" /></label>
          <label>Kezdőpénz<input id="cfgStartingMoney" type="number" /></label>
          <label>Start bónusz<input id="cfgStartBonus" type="number" /></label>
          <label>Győzelmi pénz<input id="cfgWinMoney" type="number" /></label>
          <label>Kötelező tárgyak száma<input id="cfgRequiredItems" type="number" /></label>
          <label>Mező overlay (ms)<input id="cfgEventOverlayMs" type="number" /></label>
          <label>Kártya overlay (ms)<input id="cfgCardOverlayMs" type="number" /></label>
        </div>
        <label class="top-gap block">Középső szöveg<textarea id="cfgCenterText" rows="3"></textarea></label>
        <label class="top-gap block">Lobby megjegyzés<textarea id="cfgLobbyNote" rows="3"></textarea></label>
        <label class="top-gap block">Extra config JSON<textarea id="cfgExtraJson" rows="6"></textarea></label>
        <button id="saveConfigBtn" class="board-btn board-btn-success top-gap">Globális mentés</button>
      </section>

      <section class="panel parchment-panel">
        <div class="row between wrap"><h2>Tárgyak</h2><button id="newItemBtn" class="board-btn board-btn-primary">Új tárgy</button></div>
        <div class="editor-grid top-gap">
          <div><div id="itemList" class="admin-list"></div></div>
          <div class="sub-panel">
            <h3>Tárgy szerkesztése</h3>
            <input id="itemId" type="hidden" />
            <div class="form-grid two-col">
              <label>Sorrend<input id="itemSort" type="number" /></label>
              <label>Név<input id="itemName" type="text" /></label>
              <label>Kategória<input id="itemCategory" type="text" /></label>
              <label>Ár<input id="itemPrice" type="number" /></label>
              <label>Emoji / ikon<input id="itemIcon" type="text" /></label>
              <label class="check-row"><span>Kötelező tárgy</span><input id="itemRequired" type="checkbox" checked /></label>
              <label>Háttérszín<input id="itemAccentColor" type="color" value="#f7e7b1" /></label>
              <label>Szövegszín<input id="itemTextColor" type="color" value="#311814" /></label>
            </div>
            <label class="top-gap block">Rövid leírás<textarea id="itemBlurb" rows="3"></textarea></label>
            <label class="top-gap block">Kép URL<input id="itemImageUrl" type="text" placeholder="https://... vagy data:image/..." /></label>
            <label class="top-gap block">Kép feltöltés<input id="itemImageFile" type="file" accept="image/*" /></label>
            <label class="top-gap block">Extra effect JSON<textarea id="itemEffect" rows="5"></textarea></label>
            <div class="preview-box top-gap"><div id="itemPreview" class="theme-preview"></div></div>
            <div class="row top-gap wrap"><button id="saveItemBtn" class="board-btn board-btn-success">Tárgy mentése</button><button id="deleteItemBtn" class="board-btn board-btn-danger">Törlés</button></div>
          </div>
        </div>
      </section>

      <section class="panel parchment-panel">
        <div class="row between wrap"><h2>Mezők</h2><button id="newTileBtn" class="board-btn board-btn-primary">Új mező</button></div>
        <div class="editor-grid top-gap">
          <div><div id="tileList" class="admin-list"></div></div>
          <div class="sub-panel">
            <h3>Mező szerkesztése</h3>
            <input id="tileId" type="hidden" />
            <div class="form-grid two-col">
              <label>Sorrend<input id="tileSort" type="number" /></label>
              <label>Név<input id="tileName" type="text" /></label>
              <label>Rövid név<input id="tileShortName" type="text" /></label>
              <label>Ikon<input id="tileIcon" type="text" /></label>
              <label>Típus
                <select id="tileKind">
                  <option value="start">start</option>
                  <option value="neutral">neutral</option>
                  <option value="money">money</option>
                  <option value="card">card</option>
                  <option value="shop">shop</option>
                  <option value="skip">skip</option>
                  <option value="move">move</option>
                </select>
              </label>
              <label>Színkulcs<input id="tileColorKey" type="text" placeholder="pink / gold / danger" /></label>
              <label>Pénz / alap érték<input id="tileAmount" type="number" /></label>
              <label>Ár<input id="tilePrice" type="number" /></label>
              <label>Kártyapakli<input id="tileCardGroup" type="text" placeholder="chance" /></label>
              <label>Kapcsolt tárgy<select id="tileItemId"></select></label>
              <label>Kimaradás<input id="tileSkipTurns" type="number" value="0" /></label>
              <label>Lépés<input id="tileMoveSteps" type="number" value="0" /></label>
              <label>Háttérszín<input id="tileAccentColor" type="color" value="#f7e7b1" /></label>
              <label>Szövegszín<input id="tileTextColor" type="color" value="#311814" /></label>
            </div>
            <label class="top-gap block">Leírás<textarea id="tileDescription" rows="4"></textarea></label>
            <label class="top-gap block">Kép URL<input id="tileImageUrl" type="text" placeholder="https://... vagy data:image/..." /></label>
            <label class="top-gap block">Kép feltöltés<input id="tileImageFile" type="file" accept="image/*" /></label>
            <label class="top-gap block">Extra effect JSON<textarea id="tileEffect" rows="5"></textarea></label>
            <div class="preview-box top-gap"><div id="tilePreview" class="theme-preview"></div></div>
            <div class="row top-gap wrap"><button id="saveTileBtn" class="board-btn board-btn-success">Mező mentése</button><button id="deleteTileBtn" class="board-btn board-btn-danger">Törlés</button></div>
          </div>
        </div>
      </section>

      <section class="panel parchment-panel">
        <div class="row between wrap"><h2>Kártyák</h2><button id="newCardBtn" class="board-btn board-btn-primary">Új kártya</button></div>
        <div class="editor-grid top-gap">
          <div><div id="cardList" class="admin-list"></div></div>
          <div class="sub-panel">
            <h3>Kártya szerkesztése</h3>
            <input id="cardId" type="hidden" />
            <div class="form-grid two-col">
              <label>Pakli<input id="cardGroup" type="text" value="chance" /></label>
              <label>Cím<input id="cardTitle" type="text" /></label>
              <label>Pénz változás<input id="cardAmount" type="number" value="0" /></label>
              <label>Kimaradás<input id="cardSkipTurns" type="number" value="0" /></label>
              <label>Lépés<input id="cardMoveSteps" type="number" value="0" /></label>
              <label>Kapcsolt tárgy<select id="cardItemId"></select></label>
              <label>Ikon<input id="cardIcon" type="text" /></label>
              <label>Háttérszín<input id="cardAccentColor" type="color" value="#ffd8e8" /></label>
              <label>Szövegszín<input id="cardTextColor" type="color" value="#311814" /></label>
            </div>
            <label class="top-gap block">Leírás<textarea id="cardBody" rows="4"></textarea></label>
            <label class="top-gap block">Kép URL<input id="cardImageUrl" type="text" placeholder="https://... vagy data:image/..." /></label>
            <label class="top-gap block">Kép feltöltés<input id="cardImageFile" type="file" accept="image/*" /></label>
            <label class="top-gap block">Extra effect JSON<textarea id="cardEffect" rows="5"></textarea></label>
            <div class="preview-box top-gap"><div id="cardPreview" class="theme-preview"></div></div>
            <div class="row top-gap wrap"><button id="saveCardBtn" class="board-btn board-btn-success">Kártya mentése</button><button id="deleteCardBtn" class="board-btn board-btn-danger">Törlés</button></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./assets/admin.js"></script>
</body>
</html>
