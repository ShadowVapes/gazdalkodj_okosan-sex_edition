<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gazdálkodj Okosan - Admin</title>
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body class="retro-body admin-body">
  <div class="page-frame">
    <header class="top-banner">
      <div>
        <div class="tiny-label">RETRO ADMIN</div>
        <h1>Játékbeállítások</h1>
      </div>
      <a class="retro-btn" href="./index.html">Vissza a játékhoz</a>
    </header>

    <main class="admin-layout">
      <section class="panel paper-panel">
        <h2>Globális beállítások</h2>
        <div class="form-grid two-col">
          <label>Kezdőpénz
            <input id="cfgStartingMoney" type="number" />
          </label>
          <label>Start bónusz
            <input id="cfgStartBonus" type="number" />
          </label>
          <label>Cél pénzösszeg
            <input id="cfgWinMoney" type="number" />
          </label>
          <label>Szükséges bolti tárgyak száma
            <input id="cfgRequiredItems" type="number" />
          </label>
        </div>
        <div class="button-row top-gap">
          <button id="saveConfigBtn" class="retro-btn success">Beállítások mentése</button>
        </div>
      </section>

      <section class="panel paper-panel">
        <div class="section-head">
          <h2>Mezők</h2>
          <button id="newTileBtn" class="retro-btn primary">Új mező</button>
        </div>

        <div class="editor-grid">
          <div>
            <div id="tileList" class="admin-list"></div>
          </div>
          <div class="sub-panel">
            <h3>Mező szerkesztése</h3>
            <input id="tileId" type="hidden" />
            <div class="form-grid two-col">
              <label>Sorrend
                <input id="tileSort" type="number" />
              </label>
              <label>Név
                <input id="tileName" type="text" />
              </label>
              <label>Típus
                <select id="tileKind">
                  <option value="start">start</option>
                  <option value="neutral">neutral</option>
                  <option value="money">money</option>
                  <option value="card">card</option>
                  <option value="shop">shop</option>
                  <option value="skip">skip</option>
                  <option value="move">move</option>
                </select>
              </label>
              <label>Összeg / érték
                <input id="tileAmount" type="number" value="0" />
              </label>
              <label>Bolti ár
                <input id="tilePrice" type="number" value="0" />
              </label>
              <label>Kártyapakli
                <input id="tileCardGroup" type="text" placeholder="chance" />
              </label>
            </div>
            <label class="top-gap block">Extra effect JSON
              <textarea id="tileEffect" rows="6" placeholder='{"skip_turns":1,"move_steps":2,"item":"Hűtő"}'></textarea>
            </label>
            <div class="button-row top-gap">
              <button id="saveTileBtn" class="retro-btn success">Mező mentése</button>
              <button id="deleteTileBtn" class="retro-btn danger">Törlés</button>
            </div>
          </div>
        </div>
      </section>

      <section class="panel paper-panel">
        <div class="section-head">
          <h2>Kártyák</h2>
          <button id="newCardBtn" class="retro-btn primary">Új kártya</button>
        </div>

        <div class="editor-grid">
          <div>
            <div id="cardList" class="admin-list"></div>
          </div>
          <div class="sub-panel">
            <h3>Kártya szerkesztése</h3>
            <input id="cardId" type="hidden" />
            <div class="form-grid two-col">
              <label>Pakli
                <input id="cardGroup" type="text" value="chance" />
              </label>
              <label>Cím
                <input id="cardTitle" type="text" />
              </label>
              <label>Pénz változás
                <input id="cardAmount" type="number" value="0" />
              </label>
              <label>Kör kimaradás
                <input id="cardSkipTurns" type="number" value="0" />
              </label>
              <label>Lépésszám
                <input id="cardMoveSteps" type="number" value="0" />
              </label>
            </div>
            <label class="top-gap block">Leírás
              <textarea id="cardBody" rows="4"></textarea>
            </label>
            <label class="top-gap block">Extra effect JSON
              <textarea id="cardEffect" rows="6" placeholder='{"target":"self","item":"Tv"}'></textarea>
            </label>
            <div class="button-row top-gap">
              <button id="saveCardBtn" class="retro-btn success">Kártya mentése</button>
              <button id="deleteCardBtn" class="retro-btn danger">Törlés</button>
            </div>
          </div>
        </div>
      </section>

      <section class="panel paper-panel">
        <h2>Állapot</h2>
        <div id="adminStatus" class="action-box">Betöltés...</div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./assets/admin.js"></script>
</body>
</html>
