<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gazdálkodj Pajkosan – admin</title>
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body>
  <div class="app-shell admin-shell">
    <header class="topbar">
      <div>
        <div class="eyebrow">ADMIN</div>
        <h1>Gazdálkodj Pajkosan admin</h1>
        <p class="subtitle">Egyszerű, stabil szerkesztő az alapverzióhoz.</p>
      </div>
      <div class="topbar-actions">
        <a href="./index.html" class="ghost-btn">Játék</a>
        <div id="adminStatus" class="status-pill">Betöltés…</div>
      </div>
    </header>

    <main class="admin-layout">
      <section class="panel card admin-panel">
        <div class="section-head">
          <div>
            <div class="eyebrow">GLOBLÁLIS</div>
            <h2>Konfig</h2>
          </div>
          <button id="saveConfigBtn" class="btn success">Konfig mentése</button>
        </div>
        <div class="form-grid cols-3">
          <label>Cím<input id="cfgTitle" type="text" /></label>
          <label>Alcím<input id="cfgSubtitle" type="text" /></label>
          <label>Pénznem<input id="cfgCurrency" type="text" /></label>
          <label>Kezdőpénz<input id="cfgStartingMoney" type="number" /></label>
          <label>Start áthaladás<input id="cfgPassStart" type="number" /></label>
          <label>Pontos start érkezés<input id="cfgLandStart" type="number" /></label>
          <label>Oszlopok<input id="cfgCols" type="number" min="6" max="16" /></label>
          <label>Sorok<input id="cfgRows" type="number" min="6" max="16" /></label>
          <label>Animáció ms/lépés<input id="cfgAnimMs" type="number" min="100" max="1200" /></label>
        </div>
      </section>

      <div class="admin-columns">
        <section class="panel card admin-panel">
          <div class="section-head"><h2>Tárgyak</h2><button id="newItemBtn" class="btn">Új tárgy</button></div>
          <div class="admin-split">
            <div id="itemsList" class="admin-list"></div>
            <div class="editor-box">
              <input id="itemId" type="hidden" />
              <div class="form-grid cols-2">
                <label>Név<input id="itemName" type="text" /></label>
                <label>Ikon<input id="itemIcon" type="text" /></label>
                <label>Ár<input id="itemPrice" type="number" /></label>
                <label>Sorrend<input id="itemSort" type="number" /></label>
                <label>Szín<input id="itemColor" type="text" /></label>
                <label>Aktív<select id="itemActive"><option value="true">Igen</option><option value="false">Nem</option></select></label>
                <label class="span-2">Leírás<textarea id="itemDesc"></textarea></label>
              </div>
              <div class="row-actions">
                <button id="saveItemBtn" class="btn success">Tárgy mentése</button>
                <button id="deleteItemBtn" class="btn danger">Törlés</button>
              </div>
            </div>
          </div>
        </section>

        <section class="panel card admin-panel">
          <div class="section-head"><h2>Mezők</h2><div class="topbar-actions"><button id="autoPlaceBtn" class="btn">Auto elhelyezés</button><button id="autoLinkBtn" class="btn">Auto link</button><button id="newTileBtn" class="btn">Új mező</button></div></div>
          <div class="admin-split wide-editor">
            <div id="tilesList" class="admin-list"></div>
            <div class="editor-box">
              <input id="tileId" type="hidden" />
              <div class="form-grid cols-3">
                <label>Név<input id="tileName" type="text" /></label>
                <label>Rövid név<input id="tileShort" type="text" /></label>
                <label>Ikon<input id="tileIcon" type="text" /></label>
                <label>Kind<select id="tileKind">
                  <option value="start">start</option>
                  <option value="money">money</option>
                  <option value="card">card</option>
                  <option value="shop">shop</option>
                  <option value="gift">gift</option>
                  <option value="move">move</option>
                  <option value="skip">skip</option>
                  <option value="neutral">neutral</option>
                </select></label>
                <label>Sorrend<input id="tileSort" type="number" /></label>
                <label>Következő mező<select id="tileNext"></select></label>
                <label>Pénz<input id="tileAmount" type="number" /></label>
                <label>Kimaradás<input id="tileSkip" type="number" /></label>
                <label>Lépés<input id="tileMove" type="number" /></label>
                <label>Pakli csoport<input id="tileGroup" type="text" /></label>
                <label>Buy limit<input id="tileBuyLimit" type="number" /></label>
                <label>Gift count<input id="tileGiftCount" type="number" /></label>
                <label>Vételi item ID-k (vesszővel)<input id="tileBuyIds" type="text" /></label>
                <label>Ajándék item ID-k (vesszővel)<input id="tileGiftIds" type="text" /></label>
                <label>X<input id="tileX" type="number" /></label>
                <label>Y<input id="tileY" type="number" /></label>
                <label>Szín<input id="tileColor" type="text" /></label>
                <label class="span-3">Leírás<textarea id="tileDesc"></textarea></label>
              </div>
              <div class="row-actions">
                <button id="saveTileBtn" class="btn success">Mező mentése</button>
                <button id="deleteTileBtn" class="btn danger">Törlés</button>
              </div>
              <div>
                <div class="eyebrow" style="margin-top:12px">POZÍCIÓ</div>
                <p class="helper-text">Válassz mezőt, aztán kattints a rácsra.</p>
                <div id="boardEditor" class="board-editor"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="panel card admin-panel">
          <div class="section-head"><h2>Kártyák</h2><button id="newCardBtn" class="btn">Új kártya</button></div>
          <div class="admin-split">
            <div id="cardsList" class="admin-list"></div>
            <div class="editor-box">
              <input id="cardId" type="hidden" />
              <div class="form-grid cols-3">
                <label>Cím<input id="cardTitle" type="text" /></label>
                <label>Ikon<input id="cardIcon" type="text" /></label>
                <label>Sorrend<input id="cardSort" type="number" /></label>
                <label>Csoport<input id="cardGroup" type="text" /></label>
                <label>Pénz<input id="cardAmount" type="number" /></label>
                <label>Kimaradás<input id="cardSkip" type="number" /></label>
                <label>Lépés<input id="cardMove" type="number" /></label>
                <label>Buy limit<input id="cardBuyLimit" type="number" /></label>
                <label>Gift count<input id="cardGiftCount" type="number" /></label>
                <label>Vételi item ID-k<input id="cardBuyIds" type="text" /></label>
                <label>Ajándék item ID-k<input id="cardGiftIds" type="text" /></label>
                <label>Szín<input id="cardColor" type="text" /></label>
                <label class="span-3">Leírás<textarea id="cardBody"></textarea></label>
              </div>
              <div class="row-actions">
                <button id="saveCardBtn" class="btn success">Kártya mentése</button>
                <button id="deleteCardBtn" class="btn danger">Törlés</button>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./assets/admin.js"></script>
</body>
</html>
